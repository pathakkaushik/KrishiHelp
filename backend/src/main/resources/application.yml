spring:
  application:
    name: krishimitra-backend

  datasource:
    url: jdbc:mysql://localhost:3306/krishimitra_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME:noreply@krishimitra.in}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  cache:
    type: simple

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:KrishiMitraSecretKey2024VeryLongAndSecureKeyForProduction}
    expiration: 86400000        # 24 hours
    refresh-expiration: 604800000 # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,https://krishimitra.in}
  file:
    upload-dir: ${UPLOAD_DIR:./uploads}
    max-size: 10485760
  otp:
    expiry-minutes: 10
    length: 6
  weather:
    api-key: ${WEATHER_API_KEY:}
    base-url: https://api.openweathermap.org/data/2.5
  aws:
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    region: ${AWS_REGION:ap-south-1}
    bucket: ${S3_BUCKET:krishimitra-files}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.krishimitra: DEBUG
    org.springframework.security: INFO
  file:
    name: logs/krishimitra.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
