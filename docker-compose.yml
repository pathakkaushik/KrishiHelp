version: '3.9'

services:
  # ─── MySQL Database ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: krishimitra-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-KrishiRoot@2024}
      MYSQL_DATABASE: krishimitra_db
      MYSQL_USER: krishimitra
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-KrishiDB@2024}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - krishimitra-net

  # ─── Spring Boot Backend ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krishimitra-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/krishimitra_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
      DB_USERNAME: krishimitra
      DB_PASSWORD: ${MYSQL_PASSWORD:-KrishiDB@2024}
      JWT_SECRET: ${JWT_SECRET:-KrishiMitraSecretKey2024VeryLongAndSecureKeyForJWTTokenGeneration}
      CORS_ORIGINS: http://localhost:3000,https://krishimitra.in
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-krishimitra-uploads}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - krishimitra-net

  # ─── React Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:8080/api
    container_name: krishimitra-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - krishimitra-net

  # ─── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: krishimitra-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - krishimitra-net

volumes:
  mysql_data:
  uploads:
  logs:

networks:
  krishimitra-net:
    driver: bridge
